<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Log</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        background: #f4f4f9;
        padding: 20px;
    }
    
    .log-container {
        /* Max width keeps it readable on PC, 100% width fills mobile screens */
        max-width: 500px;
        width: 100%;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 { 
        color: #333; 
        font-size: clamp(20px, 5vw, 24px); 
        text-align: center; 
        margin-bottom: 20px;
    }

    .log-entry {
        background: #eee;
        padding: 15px;
        margin: 10px 0;
        border-radius: 5px;
        font-size: 16px;
        word-wrap: break-word; /* Prevents long names from breaking mobile layouts */
    }

    .high-score { 
        border-left: 5px solid #ff4081; 
        background: #fff0f5;
    }

    button {
        display: block;
        width: 100%;
        padding: 15px;
        background: #ff4081;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 20px;
        font-weight: bold;
        font-size: 16px;
    }
</style>
</head>
<body>

<div class="log-container">
    <h1>🕵️ Secret Test Log</h1>
    <div id="logOutput">Loading records...</div>
    <button onclick="clearLog()">Clear All Records</button>
</div>

<script>
    function loadLogs() {
        let history = JSON.parse(localStorage.getItem("secretLoveLog")) || [];
        let outputDiv = document.getElementById("logOutput");
        
        if (history.length === 0) {
            outputDiv.innerHTML = "<p style='text-align:center;'>No tests have been run yet.</p>";
            return;
        }

        outputDiv.innerHTML = ""; 
        
        // Read history backwards so newest is at the top
        for (let i = history.length - 1; i >= 0; i--) {
            let record = history[i];
            let entryDiv = document.createElement("div");
            entryDiv.className = "log-entry";
            
            if (record.score === "100%") {
                entryDiv.classList.add("high-score");
            }

            entryDiv.innerHTML = `<b>${record.person1}</b> + <b>${record.person2}</b> <br>
                                  Result: <span style="color:#ff4081; font-weight:bold;">${record.score}</span> <br>
                                  <span style="font-size:12px; color:#888;">${record.time}</span>`;
            outputDiv.appendChild(entryDiv);
        }
    }

    function clearLog() {
        if(confirm("Are you sure you want to delete all saved logs?")) {
            localStorage.removeItem("secretLoveLog");
            loadLogs();
        }
    }

    loadLogs();
</script>

</body>
</html>
